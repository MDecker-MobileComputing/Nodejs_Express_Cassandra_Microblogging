  #     - CASSANDRA_PASSWORD=
  #   depends_on:
  #     cassandra-1:
  #       condition: service_healthy
  #   ports:
  #     - "3000:8083"
  #   networks:
  #     - cassandra-1-network
  #     - cassandra-2-network

networks:
  netzwerk-intern:
    driver: bridge
  netzwerk-extern:
    driver: bridge
