<!DOCTYPE html>
<html lang="de">
<head>
    <title>Microblogging mit Cassandra: Nachricht posten</title>
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="microblogging-style.css">
</head>
<body>

  <h1 id="seite-titel">Nachricht posten</h1>

  <form id="postForm">
    <fieldset id="formFieldset">
        
        <label for="nachricht">Deine Nachricht:</label><br><br>
        
        <textarea id="nachricht" name="nachricht" rows="4" cols="50"
                  placeholder="Schreibe hier deine Nachricht..." required></textarea>
        
        <br><br>
        
        <button type="submit">Senden</button>
        <button type="reset">Löschen</button>

    </fieldset>
  </form>
  <br><br>

  <!-- Link zu allen Nachrichten, wird erst nach erfolgreichem Posten sichtbar. -->
  <a id="alle-nachrichten-link" href=""></a>


  <!-- Erst JavaScript-Datei laden, wenn DOM-Baum geladen ist. -->
  <script src="posten.js"></script>  

</body>
